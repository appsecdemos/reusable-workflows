version: 2
updates:
  - package-ecosystem: "pip"
    directories:
      - "**/*"
    schedule:
      interval: "monthly"
    groups:
      pip-all:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      gha-all:
        patterns:
          - "*"
